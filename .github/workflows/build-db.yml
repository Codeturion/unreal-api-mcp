name: Build UE Database

on:
  workflow_dispatch:
    inputs:
      ue_version:
        description: "UE version to build (e.g. 5.5, 5.6, 5.7, 5.7.3)"
        required: true
        type: string
      ue_tag:
        description: "Tag on EpicGames/UnrealEngine (e.g. 5.7.3-release). Leave empty to auto-detect latest."
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve UE tag
        id: tag
        env:
          UE_PAT: ${{ secrets.UE_SOURCE_PAT }}
        run: |
          VERSION="${{ inputs.ue_version }}"
          if [ -n "${{ inputs.ue_tag }}" ]; then
            TAG="${{ inputs.ue_tag }}"
          elif echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            # Patch version (e.g. 5.7.3) -> use exact tag
            TAG="${VERSION}-release"
          else
            # Major.minor (e.g. 5.7) -> find latest release tag
            TAG=$(GH_TOKEN="$UE_PAT" gh api repos/EpicGames/UnrealEngine/tags \
              --paginate -q '.[].name' \
              | grep -E "^${VERSION}\.[0-9]+-release$" \
              | sort -V | tail -1)
            if [ -z "$TAG" ]; then
              echo "::error::No release tag found for UE ${VERSION}"
              exit 1
            fi
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Sparse checkout UE headers
        run: |
          echo "::group::Cloning EpicGames/UnrealEngine (tag: ${{ steps.tag.outputs.name }})"
          git clone --no-checkout --depth 1 --filter=blob:none \
            --branch "${{ steps.tag.outputs.name }}" \
            "https://x-access-token:${{ secrets.UE_SOURCE_PAT }}@github.com/EpicGames/UnrealEngine.git" \
            ue-source
          cd ue-source
          git sparse-checkout init --cone
          git sparse-checkout set \
            Engine/Source/Runtime \
            Engine/Source/Editor \
            Engine/Source/Developer \
            Engine/Plugins
          git checkout
          echo "::endgroup::"
          echo "Checkout size: $(du -sh . | cut -f1)"
          echo "Disk free: $(df -h . | tail -1 | awk '{print $4}')"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install .

      - name: Build database
        run: |
          python -m unreal_api_mcp.ingest \
            --unreal-version "${{ inputs.ue_version }}" \
            --unreal-install ./ue-source \
            --output "./unreal_docs_${{ inputs.ue_version }}.db"

      - name: Show results
        run: |
          DB="./unreal_docs_${{ inputs.ue_version }}.db"
          echo "Database: $DB"
          echo "Size: $(du -h "$DB" | cut -f1)"
          python -c "
          import sqlite3
          conn = sqlite3.connect('$DB')
          count = conn.execute('SELECT COUNT(*) FROM api_records').fetchone()[0]
          print(f'Record count: {count}')
          conn.close()
          "

      - name: Ensure release exists
        run: |
          gh release view db-v1 2>/dev/null || \
            gh release create db-v1 --title "Database files" \
              --notes "Pre-built SQLite databases for each UE version. Downloaded automatically on first run."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        run: |
          gh release upload db-v1 \
            "./unreal_docs_${{ inputs.ue_version }}.db" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all assets and build a summary table
          assets=$(gh release view db-v1 --json assets -q '.assets[].name' | sort -V)

          # Extract major.minor versions
          majors=$(echo "$assets" \
            | grep -oE 'unreal_docs_[0-9]+\.[0-9]+\.db' \
            | sed 's/unreal_docs_//;s/\.db//' | sort -V)

          table="| Version | Patches | DB Size |"
          table="$table
          |---------|---------|---------|"

          for mm in $majors; do
            # Find patch DBs for this major.minor
            patches=$(echo "$assets" \
              | grep -oE "unreal_docs_${mm}\.[0-9]+\.db" \
              | sed 's/unreal_docs_//;s/\.db//' | sort -V)

            if [ -n "$patches" ]; then
              first=$(echo "$patches" | head -1)
              last=$(echo "$patches" | tail -1)
              patch_range="$first - $last"
            else
              patch_range="--"
            fi

            # Get size of the major.minor DB
            size=$(gh release view db-v1 --json assets \
              -q ".assets[] | select(.name == \"unreal_docs_${mm}.db\") | .size" 2>/dev/null)
            size_mb=$(echo "scale=0; $size / 1024 / 1024" | bc 2>/dev/null || echo "?")

            table="$table
          | **$mm** | $patch_range | ~${size_mb} MB |"
          done

          total=$(echo "$assets" | wc -l)

          gh release edit db-v1 --notes "$(cat <<EOF
          Pre-built SQLite databases for Unreal Engine API documentation. Downloaded automatically on first run.

          ## Supported Versions

          $table

          **${total} databases** covering every UE 5.x release. Updated automatically via CI.

          Each major.minor database (e.g. \`5.7\`) is built from the latest patch tag. Patch databases (e.g. \`5.7.3\`) are built from the exact release tag.
          EOF
          )"
