name: Detect New UE Release

on:
  schedule:
    - cron: "0 12 * * 1" # Every Monday at noon UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for new UE versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UE_PAT: ${{ secrets.UE_SOURCE_PAT }}
        run: |
          # Fetch all tags from EpicGames/UnrealEngine (private repo)
          echo "Fetching tags from EpicGames/UnrealEngine..."
          all_tags=$(GH_TOKEN="$UE_PAT" gh api repos/EpicGames/UnrealEngine/tags \
            --paginate -q '.[].name')

          # Only consider UE 5.x+ release tags
          release_tags=$(echo "$all_tags" | grep -E '^5\.[0-9]+\.[0-9]+-release$')

          # Build list of all versions to check:
          #   - Patch versions: 5.7.3, 5.7.2, 5.5.4, etc.
          #   - Major.minor versions: 5.7, 5.5, etc. (built from latest patch)
          patch_versions=$(echo "$release_tags" | sed 's/-release$//' | sort -Vu)
          major_minor_versions=$(echo "$patch_versions" | grep -oE '^[0-9]+\.[0-9]+' | sort -Vu)
          all_versions=$(printf '%s\n%s\n' "$major_minor_versions" "$patch_versions" | sort -Vu)
          echo "Versions to check: $all_versions"

          # Fetch existing DB assets once
          existing=$(gh release view db-v1 --json assets -q '.assets[].name' 2>/dev/null || echo "")
          echo "Existing DBs: $existing"

          new_versions=""

          for version in $all_versions; do
            db_name="unreal_docs_${version}.db"

            if echo "$existing" | grep -qF "$db_name"; then
              echo "  $version: OK ($db_name exists)"
            else
              echo "  $version: NEW -- triggering build"
              new_versions="$new_versions $version"

              # Trigger the Build UE Database workflow
              gh workflow run build-db.yml \
                -f ue_version="$version" \
                -f ue_tag=""
            fi
          done

          # Create a single summary issue if new versions were found
          if [ -n "$new_versions" ]; then
            version_list=$(echo "$new_versions" | tr ' ' '\n' | sed '/^$/d' | sort -V)
            count=$(echo "$version_list" | wc -l)
            formatted=$(echo "$version_list" | sed 's/^/- `/' | sed 's/$/`/')

            gh issue create \
              --title "Auto-building $count new UE database(s)" \
              --body "$(cat <<EOF
          The weekly detect workflow found new Unreal Engine versions without databases.
          Builds have been triggered automatically.

          **New versions:**
          $formatted

          **What to check after builds complete:**
          - Confirm new \`.db\` files appear in the \`db-v1\` release
          - If a new major.minor was added, update \`_DEFAULT_VERSION\` in \`version.py\`
          - Update the README coverage table
          - Bump the package version and publish
          EOF
            )"
            echo "Created summary issue for $count new version(s)"
          else
            echo "No new versions found."
          fi
